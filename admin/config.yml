# run npx decap-server to use
local_backend: true

backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)
media_folder: "assets/images/news"
public_folder: "/assets/images/news"
collections:
  - name: "news" # Used in routes, e.g., /admin/collections/blog
    label: "News" # Used in the UI
    folder: "_news" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    extension: "md"
    format: "yaml-frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    preview_path: "news/{{year}}/{{month}}/{{day}}/{{slug}}/"
    sortable_fields: ["date"]
    sort: "date:desc"
    fields: # The fields for each document, usually in front matter
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Categories", name: "categories", widget: "list", default: ["News"], required: true}
      - {label: "Featured Image", name: "img", widget: "image"}
      - {label: "Description", name: "description", widget: "string"}
      - {label: "External URL", name: "external_url", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
publish_mode: editorial_workflow
