<div class="footer">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="footer-inner">
          <a class="footer-logo" href="{{ site.baseurl }}">
            <img width="{{ site.site_logo.desktop_width }}" height="{{ site.site_logo.desktop_height }}" alt="{{ site.title }}" src="{{ site.site_logo.desktop | relative_url }}" />
          </a>
          <ul>
            {% assign footermenu = site.data.menus.footer | sort: 'weight'  %}
            {% for item in footermenu %}
            {% assign item_url = item.url | append: "/" | replace: "//", "/" %}
            {% assign page_url = page.url | append: "/" | replace: "//", "/" %}
            <li class="{% if page_url == item_url or page_url contains item_url %}active{% endif %}">
              <a href="{{ item.url | relative_url }}">{{ item.name }}</a>
            </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
